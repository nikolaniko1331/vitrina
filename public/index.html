<script>
// ── Dynamic config from Vitrina API ──────────────────────────────────────────
const slug = (new URLSearchParams(location.search).get('s')) || 'salon-mia';
let CFG={primaryColor:'#6B3F6E',primaryTint:'#F3EBF4',accentColor:'#C9A96E',darkColor:'#1A0F1B',approvalMode:false};
let P=CFG.primaryColor,PT=CFG.primaryTint,A=CFG.accentColor,DK=CFG.darkColor;
let STAFF=[];
let SVCS=[];

function initials(name){return name?name[0].toUpperCase():'?'}

async function loadCFG(){
  try{
    const res=await fetch('/api/cfg?slug='+slug);
    const data=await res.json();
    CFG=data;
    P=CFG.primaryColor||P;PT=CFG.primaryTint||PT;A=CFG.accentColor||A;DK=CFG.darkColor||DK;
    STAFF=(data.staff||[]).map(s=>({...s,initials:initials(s.name)}));
    SVCS=(data.services||[]).map(s=>({
      ...s,
      name:s.name,
      dur:s.duration_min,
      price:s.price?Math.round(s.price).toLocaleString('mk-MK')+' ден':'',
      pool:s.pool
    }));
    // update hero text
    if(data.name){
      const el=document.getElementById('hero-tagline');
      if(el)el.textContent=data.tagline||data.name;
    }
    if(data.subtitle){
      const el=document.getElementById('hero-subtitle');
      if(el)el.textContent=data.subtitle;
    }
    if(data.name){
      const el=document.getElementById('cta-main');
      if(el)el.textContent=data.ctaLabel||'Резервирај термин';
    }
    // re-render open hours badge
    const oh=document.getElementById('open-hours');
    if(oh&&data.hours)oh.textContent=data.hours;
    const ratingEl=document.getElementById('hero-rating');
    if(ratingEl&&data.rating)ratingEl.textContent=data.rating+'★';
    applyLang();
  }catch(e){console.error('CFG load failed',e)}
}
const SLOTS=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];
const MO=['Јануари','Февруари','Март','Април','Мај','Јуни','Јули','Август','Септември','Октомври','Ноември','Декември'];
let approvalMode=CFG.approvalMode,curTab='today',staffBlocks={};
let bookings=[{id:1,name:'Ана Петровска',phone:'+389 70 111 222',svc:'Фенирање',staff:1,date:'2026-06-27',time:'10:00',dur:30,status:'confirmed'},{id:2,name:'Марија Јовановска',phone:'+389 71 333 444',svc:'Боење (целосно)',staff:2,date:'2026-06-27',time:'11:00',dur:120,status:'pending'},{id:3,name:'Лена Стефанова',phone:'+389 72 555 666',svc:'Маникир',staff:3,date:'2026-06-27',time:'14:00',dur:60,status:'confirmed'}];
let nid=10,bkSvc=null,bkDate=null,bkSlot=null,bkStaff=null,bkStep=1,bkCY,bkCM,bkName='',bkPhone='',bkEmail='';
let schedStaff=1,schedCY,schedCM,schedDay=null,abSvc=null,abDate=null,abSlot=null,abStaff=null,abStep=1,abCY,abCM;
document.getElementById('s1').src=IMG1;
document.getElementById('s2').src=IMG2;
document.getElementById('s3').src=IMG3;
function fd(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function sbn(id){return STAFF.find(s=>s.id===id)||STAFF[0]}
function sb(sid,dk){if(!staffBlocks[sid])staffBlocks[sid]={};if(!staffBlocks[sid][dk])staffBlocks[sid][dk]={fullDay:false,slots:new Set()};return staffBlocks[sid][dk]}
function slotsN(dur){return Math.ceil(dur/30)}
function occ(sid,dk){const s=new Set();const b=staffBlocks[sid]&&staffBlocks[sid][dk];if(b&&b.fullDay){SLOTS.forEach(x=>s.add(x));return s}if(b&&b.slots)b.slots.forEach(x=>s.add(x));bookings.filter(x=>x.staff===sid&&x.date===dk&&x.status!=='cancelled').forEach(x=>{const n=slotsN(x.dur);const i=SLOTS.indexOf(x.time);for(let j=0;j<n&&i+j<SLOTS.length;j++)s.add(SLOTS[i+j])});return s}
function slotAvail(sid,dk,slot,dur){const n=slotsN(dur);const i=SLOTS.indexOf(slot);if(i<0||i+n>SLOTS.length)return false;const o=occ(sid,dk);for(let j=0;j<n;j++)if(o.has(SLOTS[i+j]))return false;return true}
function pickStaff(svc,dk,slot){return svc.pool.find(id=>slotAvail(id,dk,slot,svc.dur))||null}
function availC(sid,dk,dur){const n=slotsN(dur);const o=occ(sid,dk);let c=0;for(let i=0;i<=SLOTS.length-n;i++){let ok=true;for(let j=0;j<n;j++)if(o.has(SLOTS[i+j])){ok=false;break}if(ok)c++}return c}
function tabDates(tab){const t=new Date();if(tab==='today')return[fd(t)];if(tab==='tmr')return[fd(addD(t,1))];const r=[];const dow=t.getDay();const d=dow===0?-6:1-dow;for(let i=0;i<7;i++)r.push(fd(addD(t,d+i)));return r}
const T={МК:{nav_about:'За нас',nav_services:'Услуги',nav_contact:'Контакт',tagline:'Убавина со страст',subtitle:'Стручни стилисти · Луксузно искуство',cta:'Резервирај термин',open:'Отворено',bk_svc:'Одбери услуга',bk_date:'Одбери датум',bk_slot:'Одбери термин',bk_data:'Твои податоци',bk_otp:'Потврди телефон',bk_ok:'Резервирано!',bk_pending:'На чекање',bk_next:'Следно',bk_back:'Назад',bk_confirm:'Потврди →',bk_close:'Затвори',ph_name:'Ime i prezime',ph_phone:'+389 7X XXX XXX',ph_email:'email@primer.mk',ph_note:'Напомена (по желба)',otp_sent:'Испративме SMS на',otp_err:'Погрешен код. Demo: 1234',otp_change:'Промени телефон',confirmed:'Твојот термин е потврден.',reminder:'Ќе добиеш потсетник 1 ч. пред.',email_sent:'Потврда испратена на',cancel_policy:'Откажување до 2ч пред термин',pending_msg:'Резервацијата е примена.',salon_contact:'Салонот ќе те контактира за потврда.'},SQ:{nav_about:'Rreth nesh',nav_services:'Shërbimet',nav_contact:'Kontakt',tagline:'Bukuri me pasion',subtitle:'Stilistë profesionistë · Art luksoz',cta:'Rezervo termin',open:'Hapur',bk_svc:'Zgjidhni shërbimin',bk_date:'Zgjidhni datën',bk_slot:'Zgjidhni orarin',bk_data:'Të dhënat tuaja',bk_otp:'Konfirmo telefonin',bk_ok:'Rezervuar!',bk_pending:'Në pritje',bk_next:'Vazhdo',bk_back:'Kthehu',bk_confirm:'Konfirmo →',bk_close:'Mbyll',ph_name:'Emri dhe mbiemri',ph_phone:'+383 4X XXX XXX',ph_email:'email@shembull.com',ph_note:'Shënim (opsional)',otp_sent:'Dërguam SMS në',otp_err:'Kod i gabuar. Demo: 1234',otp_change:'Ndrysho numrin',confirmed:'Termini juaj është konfirmuar.',reminder:'Do të merrni kujtesë 1 orë para.',email_sent:'Konfirmimi u dërgua te',cancel_policy:'Anulim deri 2 orë para terminit',pending_msg:'Rezervimi është marrë.',salon_contact:"Saloni do t'ju kontaktojë për konfirmim."}};
let curLang='МК';
function t(k){return T[curLang][k]||T['МК'][k]||k}
function applyLang(){var m={'nav-about':t('nav_about'),'nav-services':t('nav_services'),'nav-contact':t('nav_contact'),'hero-tagline':t('tagline'),'hero-subtitle':t('subtitle'),'cta-main':t('cta'),'open-label':t('open')};Object.keys(m).forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=m[id];});}
function setLang(l){curLang=l;document.getElementById('lang-mk').style.background=l==='МК'?P:'transparent';document.getElementById('lang-mk').style.color=l==='МК'?'#fff':'#999';document.getElementById('lang-sq').style.background=l==='SQ'?P:'transparent';document.getElementById('lang-sq').style.color=l==='SQ'?'#fff':'#999';applyLang();}
function openLogin(){const el=document.getElementById('login-ov');el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center'}
function doLogin(){const u=document.getElementById('lu').value,pw=document.getElementById('lp').value;if(u==='admin'&&pw==='1234'){document.getElementById('login-ov').style.display='none';document.getElementById('site-view').style.display='none';const av=document.getElementById('admin-view');av.style.display='flex';av.style.flexDirection='column';document.getElementById('brand-tag').textContent='Администраторски панел';document.getElementById('admin-btn').style.display='none';document.getElementById('logout-btn').style.display='block';renderAptList()}else{document.getElementById('lerr').style.display='block'}}
function showSite(){document.getElementById('admin-view').style.display='none';const sv=document.getElementById('site-view');sv.style.display='flex';sv.style.flexDirection='column';document.getElementById('brand-tag').textContent='Фризерски салон · Скопје';document.getElementById('admin-btn').style.display='flex';document.getElementById('logout-btn').style.display='none'}
function toggleApproval(){approvalMode=!approvalMode;document.getElementById('apr-tog').style.background=approvalMode?P:'#ccc';document.getElementById('apr-knob').style.left=approvalMode?'20px':'2px'}
function setTab(t){curTab=t;['today','tmr','week'].forEach(x=>{const el=document.getElementById('tab-'+x);if(el){el.style.background=x===t?'#fff':'transparent';el.style.color=x===t?DK:'#999';el.style.fontWeight=x===t?'500':'400'}});renderAptList()}
function renderAptList(){const el=document.getElementById('apt-list');if(!el)return;const keys=tabDates(curTab);const f=bookings.filter(b=>keys.includes(b.date)&&b.status!=='cancelled').sort((a,b)=>a.time.localeCompare(b.time));if(!f.length){el.innerHTML='<div style="text-align:center;padding:32px 0;color:#bbb;font-size:13px">Нема резервации</div>';return}el.innerHTML=f.map(b=>{const st=sbn(b.staff);const sc=b.status==='confirmed'?'#4CAF50':'#FF9800';const sl=b.status==='confirmed'?'Потврдена':'На чекање';return`<div onclick="openAptDetail(${b.id})" style="background:#fff;border-radius:10px;border:1px solid #ede5ee;padding:12px 14px;cursor:pointer"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><div style="font-size:13px;font-weight:500;color:${DK}">${b.name}</div><div style="font-size:10px;color:${sc};background:${sc}22;padding:2px 8px;border-radius:10px;font-weight:500">${sl}</div></div><div style="font-size:12px;color:#777;margin-bottom:4px">${b.svc}</div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:11px;color:#bbb">${b.time}</div><div style="width:1px;height:10px;background:#e8dfe9"></div><div style="width:18px;height:18px;border-radius:50%;background:${st.color};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:600">${st.initials}</div><div style="font-size:11px;color:#bbb">${st.name}</div></div></div>`}).join('')}
function openAptDetail(id){const b=bookings.find(x=>x.id===id);if(!b)return;const st=sbn(b.staff);const sc=b.status==='confirmed'?'#4CAF50':'#FF9800';const sl=b.status==='confirmed'?'Потврдена':'На чекање';let acts='';if(b.status==='pending')acts=`<div style="display:flex;gap:8px;margin-top:16px"><button onclick="confirmApt(${id})" style="flex:1;padding:10px;background:${P};border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Потврди</button><button onclick="cancelApt(${id})" style="flex:1;padding:10px;background:transparent;border:1px solid #e53935;border-radius:8px;color:#e53935;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif">Откажи</button></div>`;else if(b.status==='confirmed')acts=`<button onclick="cancelApt(${id})" style="width:100%;margin-top:16px;padding:10px;background:transparent;border:1px solid #e53935;border-radius:8px;color:#e53935;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif">Откажи термин</button>`;document.getElementById('apt-detail').innerHTML=`<div style="font-size:16px;font-weight:500;color:${DK};margin-bottom:4px">${b.name}</div><div style="font-size:11px;color:${sc};background:${sc}22;display:inline-block;padding:2px 10px;border-radius:10px;margin-bottom:16px">${sl}</div><div style="display:flex;flex-direction:column;gap:10px;font-size:13px;color:#555"><div><span style="font-size:10px;color:#bbb;display:block;margin-bottom:2px">Услуга</span>${b.svc}</div><div><span style="font-size:10px;color:#bbb;display:block;margin-bottom:2px">Датум и час</span>${b.date} · ${b.time}</div><div><span style="font-size:10px;color:#bbb;display:block;margin-bottom:2px">Стилист</span>${st.name}</div><div><span style="font-size:10px;color:#bbb;display:block;margin-bottom:2px">Телефон</span>${b.phone}</div></div>${acts}`;const el=document.getElementById('apt-ov');el.style.display='flex';el.style.alignItems='flex-end'}

pointer;font-family:'Inter',sans-serif">Назад</button><button onclick="bkSub4()" style="flex:2;padding:12px;border-radius:10px;border:none;background:${P};color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Потврди →</button></div></div>`}

function otpIn(inp,i){inp.value=inp.value.slice(-1);if(inp.value&&i<3)document.getElementById('otp-'+(i+1))?.focus()}

function renderSched(){const el=document.getElementById('sched-body');if(!el)return;const fd2=new Date(schedCY,schedCM,1);const ld=new Date(schedCY,schedCM+1,0);let sd=fd2.getDay();if(sd===0)sd=7;sd--;const now=new Date();el.innerHTML=`<div style="padding-top:4px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-family:'Playfair Display',serif;font-size:18px;color:${DK}">Распоред</div><button onclick="document.getElementById('sched-ov').style.display='none'" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;color:#bbb;font-size:16px">✕</button></div><div style="display:flex;gap:5px;margin-bottom:12px">${STAFF.map(s=>`<button onclick="setSchedS(${s.id})" style="flex:1;padding:7px 4px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;border:${s.id===schedStaff?`2px solid ${s.color}`:'1px solid #ede5ee'};background:${s.id===schedStaff?s.color+'20':'transparent'};color:${s.id===schedStaff?s.color:'#999'}">${s.initials} ${s.name}</button>`).join('')}</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><button onclick="scP()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button><div style="font-size:13px;font-weight:500;color:${DK}">${MO[schedCM]} ${schedCY}</div><button onclick="scN()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px">${['П','В','С','Ч','П','С','Н'].map(d=>`<div style="text-align:center;font-size:10px;color:#b89fba;padding:3px">${d}</div>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px">${Array(sd).fill('<div></div>').join('')}${Array.from({length:ld.getDate()},(_,i)=>{const d=i+1;const dobj=new Date(schedCY,schedCM,d);const dk=fd(dobj);const past=dobj<now;const sel=dk===schedDay;const blk=staffBlocks[schedStaff]&&staffBlocks[schedStaff][dk];const isFD=blk&&blk.fullDay;return`<div onclick="${!past?`scSelD('${dk}')`:''}" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;cursor:${past?'default':'pointer'};background:${sel?P:isFD?'#ffe5e5':'transparent'};color:${sel?'#fff':isFD?'#e53935':past?'#ccc':DK};text-decoration:${isFD&&!sel?'line-through':'none'}">${d}</div>`}).join('')}</div>${schedDay?renderDayPanel():`<div style="text-align:center;font-size:12px;color:#bbb;padding:12px 0">Одбери ден</div>`}</div>`}
function setSchedS(id){schedStaff=id;schedDay=null;renderSched()}

function scN(){if(schedCM===11){schedCY++;schedCM=0}else schedCM++;renderSched()}
function scSelD(dk){schedDay=dk;renderSched();setTimeout(()=>document.getElementById('day-panel')?.scrollIntoView({behavior:'smooth',block:'nearest'}),50)}
function renderDayPanel(){const blk=sb(schedStaff,schedDay);return`<div id="day-panel" style="border:1px solid #ede5ee;border-radius:10px;padding:13px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:13px;font-weight:500;color:${DK}">${schedDay}</div><div style="display:flex;align-items:center;gap:7px"><div style="font-size:11px;color:#777">Цел ден</div><div onclick="togFD()" style="width:36px;height:20px;border-radius:10px;background:${blk.fullDay?'#e53935':'#ccc'};position:relative;cursor:pointer"><div style="position:absolute;top:2px;left:${blk.fullDay?'18':'2'}px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 200ms"></div></div></div></div>${!blk.fullDay?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px">${SLOTS.map(slot=>{const isB=blk.slots.has(slot);const hasBk=bookings.some(b=>b.staff===schedStaff&&b.date===schedDay&&b.time===slot&&b.status!=='cancelled');return`<button onclick="${!hasBk?`togSlot('${slot}')`:''}" ${hasBk?'disabled':''} style="padding:5px 2px;border-radius:6px;font-size:10px;cursor:${hasBk?'default':'pointer'};border:${isB?'1.5px solid #e53935':'1px solid #ede5ee'};background:${isB?'#ffe5e5':hasBk?'#faf8fb':'#fff'};color:${isB?'#e53935':hasBk?'#ccc':'#555'};font-family:'Inter',sans-serif">${slot}</button>`}).join('')}</div>`:'<div style="text-align:center;font-size:11px;color:#bbb;padding:8px">Целиот ден е блокиран</div>'}<button onclick="document.getElementById('sched-ov').style.display='none'" style="width:100%;padding:10px;border-radius:8px;border:none;background:${P};color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Зачувај</button></div>`}
function togFD(){const blk=sb(schedStaff,schedDay);blk.fullDay=!blk.fullDay;renderSched()}
function togSlot(slot){const blk=sb(schedStaff,schedDay);if(blk.slots.has(slot))blk.slots.delete(slot);else blk.slots.add(slot);renderSched()}
function openAdminBook(){abSvc=null;abDate=null;abSlot=null;abStaff=null;abStep=1;const n=new Date();abCY=n.getFullYear();abCM=n.getMonth();renderAB();const ov=document.getElementById('ab-ov');ov.style.display='flex';ov.style.alignItems='flex-end'}
function renderAB(){const el=document.getElementById('ab-body');if(!el)return;if(abStep===1){el.innerHTML=`<div style="padding-top:4px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:'Playfair Display',serif;font-size:18px;color:${DK}">Рачна резервација</div><button onclick="document.getElementById('ab-ov').style.display='none'" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;color:#bbb;font-size:16px">✕</button></div>${SVCS.map((s,i)=>`<div onclick="abSelS(${i})" style="margin-bottom:7px;padding:11px 13px;border-radius:10px;cursor:pointer;border:${abSvc===s?`2px solid ${P}`:'1px solid #ede5ee'};background:${abSvc===s?PT:'#fff'}"><div style="display:flex;justify-content:space-between"><div style="font-size:13px;font-weight:500;color:${DK}">${s.name}</div><div style="font-size:12px;color:${A}">${s.price}</div></div><div style="font-size:11px;color:#bbb;margin-top:4px">${s.dur} мин</div></div>`).join('')}<button onclick="abNext()" ${!abSvc?'disabled':''} style="width:100%;margin-top:8px;padding:12px;border-radius:10px;border:none;background:${abSvc?P:'#e8dfe9'};color:${abSvc?'#fff':'#bbb'};font-size:14px;font-weight:500;cursor:${abSvc?'pointer':'default'};font-family:'Inter',sans-serif">Следно</button></div>`}else if(abStep===2){const fd2=new Date(abCY,abCM,1);const ld=new Date(abCY,abCM+1,0);let sd=fd2.getDay();if(sd===0)sd=7;sd--;const now=new Date();el.innerHTML=`<div style="padding-top:4px"><button onclick="abBack()" style="margin-bottom:10px;padding:6px 0;border:none;background:transparent;color:${P};font-size:13px;cursor:pointer;font-family:'Inter',sans-serif">← Назад</button><div style="font-family:'Playfair Display',serif;font-size:18px;color:${DK};margin-bottom:10px">Датум и термин</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><button onclick="abCP()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button><div style="font-size:13px;font-weight:500;color:${DK}">${MO[abCM]} ${abCY}</div><button onclick="abCN()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px">${['П','В','С','Ч','П','С','Н'].map(d=>`<div style="text-align:center;font-size:10px;color:#b89fba;padding:3px">${d}</div>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px">${Array(sd).fill('<div></div>').join('')}${Array.from({length:ld.getDate()},(_,i)=>{const d=i+1;const dobj=new Date(abCY,abCM,d);const dk=fd(dobj);const past=dobj<now;const sel=dk===abDate;return`<div onclick="${!past?`abSelD('${dk}')`:''}" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;cursor:${past?'default':'pointer'};background:${sel?P:'transparent'};color:${sel?'#fff':past?'#ccc':DK}">${d}</div>`}).join('')}</div>${abDate?`<div style="font-size:11px;color:#b89fba;margin-bottom:8px">Термини — ${abDate}</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">${SLOTS.map(slot=>{const av=abSvc.pool.some(id=>slotAvail(id,abDate,slot,abSvc.dur));const sel=abSlot===slot;return`<button onclick="${av?`abSelSlot('${slot}')`:''}" ${!av?'disabled':''} style="padding:7px 2px;border-radius:8px;font-size:11px;cursor:${av?'pointer':'default'};border:${sel?`2px solid ${P}`:'1px solid #ede5ee'};background:${sel?PT:av?'#fff':'#faf8fb'};color:${sel?P:av?DK:'#ccc'};font-family:'Inter',sans-serif">${slot}</button>`}).join('')}</div><button onclick="abNext()" ${!abSlot?'disabled':''} style="width:100%;padding:12px;border-radius:10px;border:none;background:${abSlot?P:'#e8dfe9'};color:${abSlot?'#fff':'#bbb'};font-size:14px;font-weight:500;cursor:${abSlot?'pointer':'default'};font-family:'Inter',sans-serif">Следно</button>`:''}</div>`}else if(abStep===3){abStaff=pickStaff(abSvc,abDate,abSlot);const st=sbn(abStaff);el.innerHTML=`<div style="padding-top:4px"><button onclick="abBack()" style="margin-bottom:10px;padding:6px 0;border:none;background:transparent;color:${P};font-size:13px;cursor:pointer;font-family:'Inter',sans-serif">← Назад</button><div style="font-family:'Playfair Display',serif;font-size:18px;color:${DK};margin-bottom:14px">Детали за клиент</div><div style="background:${PT};border-radius:8px;padding:11px 13px;margin-bottom:13px;font-size:12px;color:#777">${abSvc.name} · ${abDate} · ${abSlot} · ${st.name}</div><input id="ab-n" type="text" placeholder="Ime i prezime" style="width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:8px;font-family:'Inter',sans-serif;outline:none"/><input id="ab-p" type="tel" placeholder="+389 7X XXX XXX" style="width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:14px;font-family:'Inter',sans-serif;outline:none"/><button onclick="abSub()" style="width:100%;padding:12px;border-radius:10px;border:none;background:${P};color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Резервирај</button></div>`}else{el.innerHTML=`<div style="padding:24px 0;text-align:center"><div style="width:56px;height:56px;border-radius:50%;background:${PT};display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${A}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div style="font-family:'Playfair Display',serif;font-size:18px;color:${DK};margin-bottom:8px">Резервирано!</div><div style="font-size:12px;color:#999;margin-bottom:18px">${abSvc?.name}<br>${abDate} · ${abSlot}</div><button onclick="document.getElementById('ab-ov').style.display='none';renderAptList()" style="width:100%;padding:12px;border-radius:10px;border:none;background:${P};color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Затвори</button></div>`}}
function abSelS(i){abSvc=SVCS[i];renderAB()}
function abSelD(dk){abDate=dk;abSlot=null;renderAB()}
function abSelSlot(s){abSlot=s;renderAB()}
function abCP(){if(abCM===0){abCY--;abCM=11}else abCM--;renderAB()}
function abCN(){if(abCM===11){abCY++;abCM=0}else abCM++;renderAB()}
function abNext(){abStep++;renderAB()}
function abBack(){abStep=Math.max(1,abStep-1);renderAB()}
function abSub(){const n=document.getElementById('ab-n')?.value?.trim();const pw=document.getElementById('ab-p')?.value?.trim();if(!n||!pw)return;bookings.push({id:nid++,name:n,phone:pw,svc:abSvc.name,staff:abStaff,date:abDate,time:abSlot,dur:abSvc.dur,status:'confirmed'});abStep=4;renderAB()}
</script>
